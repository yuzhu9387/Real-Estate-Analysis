<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AED Project Permitting Timeline Report</title>
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--text:#e8eaed;--text2:#9aa0a6;--accent:#8ab4f8;--border:#3c4043}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.header{background:linear-gradient(135deg,#1a237e 0%,#0d47a1 50%,#01579b 100%);padding:32px 40px}
.header h1{font-size:28px;font-weight:700;margin-bottom:6px}
.header p{color:rgba(255,255,255,0.75);font-size:14px}
.stats-bar{display:flex;gap:24px;margin-top:16px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,0.1);border-radius:8px;padding:10px 18px}
.stat-val{font-size:22px;font-weight:700;color:#fff}
.stat-lbl{font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.5px}
.container{max-width:1600px;margin:0 auto;padding:20px}
.biz-tabs{display:flex;gap:4px;margin-bottom:20px}
.biz-tab{padding:12px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:8px 8px 0 0;cursor:pointer;font-size:14px;font-weight:600;color:var(--text2);transition:all 0.2s}
.biz-tab:hover{background:var(--bg3);color:var(--text)}
.biz-tab.active{background:var(--bg3);color:var(--accent);border-bottom-color:var(--bg3)}
.biz-tab .tc{background:rgba(138,180,248,0.15);color:var(--accent);border-radius:10px;padding:2px 8px;font-size:11px;margin-left:6px}
.biz-content{display:none}
.biz-content.active{display:block}
.proj-list{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.proj-btn{padding:8px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.2s}
.proj-btn:hover{border-color:var(--accent);color:var(--text)}
.proj-btn.active{background:rgba(138,180,248,0.1);border-color:var(--accent);color:var(--accent)}
.proj-btn .dur{font-size:11px;color:var(--text2);margin-left:4px}
.proj-panel{display:none}
.proj-panel.active{display:block}
.gantt-wrap{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:20px;overflow-x:auto}
.gantt-title{font-size:18px;font-weight:700;margin-bottom:4px}
.gantt-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-color{width:14px;height:14px;border-radius:3px}
.task-table{width:100%;border-collapse:collapse;font-size:13px}
.task-table th{text-align:left;padding:10px 12px;background:var(--bg3);color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
.task-table td{padding:8px 12px;border-bottom:1px solid rgba(60,64,67,0.5);vertical-align:middle}
.task-table tr:hover td{background:rgba(138,180,248,0.05)}
.phase-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.dept-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(255,255,255,0.08)}
.pi{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 6px;border-radius:3px}
.pi.parallel{background:rgba(102,187,106,0.15);color:#66bb6a}
.pi.sequential{background:rgba(255,167,38,0.15);color:#ffa726}
.pi.milestone{background:rgba(171,71,188,0.15);color:#ab47bc}
.table-wrap{background:var(--bg2);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.table-scroll{max-height:600px;overflow-y:auto}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-header h3{font-size:15px;font-weight:600}
#tooltip{position:fixed;background:#2d3142;border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text);pointer-events:none;z-index:1000;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none}
.tt-phase{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.tt-task{font-size:14px;font-weight:600;margin-bottom:6px}
.tt-row{display:flex;justify-content:space-between;gap:16px;margin-top:3px}
.tt-label{color:var(--text2)}
.gantt-bar{cursor:pointer;transition:opacity 0.2s}
.gantt-bar:hover{opacity:0.85}
</style>
</head>

function pc(p){return PC[p]||'#78909c'}
function dc(d){return DC[d]||'#78909c'}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const tooltip=document.getElementById('tooltip');

function init(){
  const tabs=document.getElementById('bizTabs');
  const cont=document.getElementById('bizContents');
  const bls=Object.keys(DATA);
  bls.forEach((bl,i)=>{
    const info=BI[bl]||{c:'#78909c',l:bl,i:'\u{1F4CB}'};
    const tab=document.createElement('div');
    tab.className='biz-tab'+(i===0?' active':'');
    tab.innerHTML=info.i+' '+bl+' <span class="tc">'+DATA[bl].length+' types</span>';
    tab.onclick=()=>switchBiz(bl);
    tab.dataset.biz=bl;
    tabs.appendChild(tab);

    const c=document.createElement('div');
    c.className='biz-content'+(i===0?' active':'');
    c.id='biz-'+bl.replace(/\s/g,'_');
    c.innerHTML=buildBiz(bl);
    cont.appendChild(c);
  });
  if(bls.length>0)switchProject(bls[0],0);
}

function switchBiz(bl){
  document.querySelectorAll('.biz-tab').forEach(t=>t.classList.toggle('active',t.dataset.biz===bl));
  document.querySelectorAll('.biz-content').forEach(c=>c.classList.toggle('active',c.id==='biz-'+bl.replace(/\s/g,'_')));
  switchProject(bl,0);
}

function switchProject(bl,idx){
  const c=document.getElementById('biz-'+bl.replace(/\s/g,'_'));
  c.querySelectorAll('.proj-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  c.querySelectorAll('.proj-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

function buildBiz(bl){
  const projs=DATA[bl];
  let h='<div class="proj-list">';
  projs.forEach((p,i)=>{
    h+='<div class="proj-btn '+(i===0?'active':'')+'" onclick="switchProject(\''+bl.replace(/'/g,"\\'")+'\','+i+')">'+esc(p.type)+' <span class="dur">'+p.totalDays+'d</span></div>';
  });
  h+='</div>';
  projs.forEach((p,i)=>{
    h+='<div class="proj-panel '+(i===0?'active':'')+'">'+buildProj(p)+'</div>';
  });
  return h;
}

function buildProj(proj){
  const tasks=proj.tasks;
  const maxDay=Math.max(...tasks.map(t=>t.e),proj.totalDays);
  const phases=[...new Set(tasks.map(t=>t.p))];

  // Day start groups for parallel detection
  const dsg={};
  tasks.forEach(t=>{if(!dsg[t.s])dsg[t.s]=[];dsg[t.s].push(t)});

  // Legend
  let lg='<div class="legend">';
  phases.forEach(ph=>{lg+='<div class="legend-item"><div class="legend-color" style="background:'+pc(ph)+'"></div>'+esc(ph)+'</div>'});
  lg+='<div class="legend-item"><div class="legend-color" style="background:rgba(102,187,106,0.3);border:1px solid #66bb6a"></div>Parallel</div>';
  lg+='<div class="legend-item"><div class="legend-color" style="background:rgba(255,167,38,0.3);border:1px solid #ffa726"></div>Sequential</div>';
  lg+='</div>';

  // SVG Gantt
  const rh=28,lw=280,cw=900,tw=lw+cw+40;
  const svgH=tasks.length*rh+60;
  let svg='<svg viewBox="0 0 '+tw+' '+svgH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:1100px">';

  // Time grid
  if(maxDay<=100){
    for(let d=0;d<=maxDay;d+=15){
      const x=lw+(d/maxDay)*cw;
      svg+='<line x1="'+x+'" y1="30" x2="'+x+'" y2="'+svgH+'" stroke="rgba(255,255,255,0.06)"/>';
      svg+='<text x="'+x+'" y="20" fill="#9aa0a6" font-size="10" text-anchor="middle">D'+d+'</text>';
    }
  } else {
    for(let d=0;d<=maxDay;d+=30){
      const x=lw+(d/maxDay)*cw;
      svg+='<line x1="'+x+'" y1="30" x2="'+x+'" y2="'+svgH+'" stroke="rgba(255,255,255,0.06)"/>';
      svg+='<text x="'+x+'" y="20" fill="#9aa0a6" font-size="10" text-anchor="middle">M'+Math.round(d/30)+'</text>';
    }
  }

  tasks.forEach((t,idx)=>{
    const y=idx*rh+40;
    const bs=lw+(t.s/maxDay)*cw;
    const dur=t.e-t.s;
    const bw=Math.max((dur/maxDay)*cw,3);
    const col=pc(t.p);
    const isPar=dsg[t.s]&&dsg[t.s].length>1;
    const isMile=dur===0;

    if(idx%2===0) svg+='<rect x="0" y="'+(y-4)+'" width="'+tw+'" height="'+rh+'" fill="rgba(255,255,255,0.02)"/>';
    if(isPar&&!isMile) svg+='<rect x="'+(bs-2)+'" y="'+(y-2)+'" width="'+(bw+4)+'" height="'+(rh-8)+'" rx="3" fill="rgba(102,187,106,0.08)" stroke="rgba(102,187,106,0.2)" stroke-width="0.5"/>';

    const label=t.m.length>32?t.m.substring(0,30)+'...':t.m;
    svg+='<text x="'+(lw-8)+'" y="'+(y+12)+'" fill="'+col+'" font-size="10" text-anchor="end" font-weight="500">'+esc(label)+'</text>';

    // Store task index as data for tooltip
    if(isMile){
      svg+='<polygon points="'+bs+','+(y+2)+' '+(bs+8)+','+(y+8)+' '+bs+','+(y+14)+' '+(bs-8)+','+(y+8)+'" fill="'+col+'" class="gantt-bar" data-tidx="'+idx+'" data-pidx="'+proj.type+'"/>';
    } else {
      svg+='<rect x="'+bs+'" y="'+(y+2)+'" width="'+bw+'" height="'+(rh-12)+'" rx="3" fill="'+col+'" opacity="0.85" class="gantt-bar" data-tidx="'+idx+'" data-pidx="'+proj.type+'"/>';
    }

    svg+='<circle cx="'+(lw+cw+20)+'" cy="'+(y+8)+'" r="5" fill="'+dc(t.dept)+'"/>';
  });
  svg+='</svg>';

  // Task table
  let tb='<div class="table-wrap"><div class="table-header"><h3>Task Details ('+tasks.length+' tasks)</h3></div><div class="table-scroll"><table class="task-table"><thead><tr>';
  tb+='<th style="width:40px">#</th><th style="width:55px">Start</th><th style="width:55px">End</th><th style="width:70px">Duration</th><th>Phase</th><th>Task</th><th>Department</th><th style="width:90px">Flow</th></tr></thead><tbody>';

  tasks.forEach((t,idx)=>{
    const isPar=dsg[t.s]&&dsg[t.s].length>1;
    const isMile=(t.e-t.s)===0;
    const fc=isMile?'milestone':(isPar?'parallel':'sequential');
    const fl=isMile?'&#9670; Milestone':(isPar?'&#8741; Parallel':'&rarr; Sequential');
    const phc=pc(t.p);
    const dcc=dc(t.dept);
    tb+='<tr><td style="color:var(--text2)">'+(idx+1)+'</td><td><strong>D'+t.s+'</strong></td><td>D'+t.e+'</td><td>'+esc(t.d)+'</td>';
    tb+='<td><span class="phase-badge" style="background:'+phc+'22;color:'+phc+'">'+esc(t.p)+'</span></td>';
    tb+='<td>'+esc(t.m)+'</td>';
    tb+='<td><span class="dept-badge" style="border-left:3px solid '+dcc+';padding-left:8px">'+esc(t.dept)+'</span></td>';
    tb+='<td><span class="pi '+fc+'">'+fl+'</span></td></tr>';
  });
  tb+='</tbody></table></div></div>';

  return '<div class="gantt-wrap"><div class="gantt-title">'+esc(proj.name)+'</div><div class="gantt-sub">Total Duration: '+proj.totalDays+' days ('+esc(proj.totalMonths)+') &middot; '+tasks.length+' tasks &middot; '+phases.length+' phases</div>'+lg+'<div class="gantt-container" style="overflow-x:auto">'+svg+'</div></div>'+tb;
}

// Event delegation for tooltips
document.addEventListener('mousemove',function(e){
  const bar=e.target.closest('.gantt-bar');
  if(!bar){tooltip.style.display='none';return}
  const tidx=parseInt(bar.dataset.tidx);
  const ptype=bar.dataset.pidx;
  // Find the project
  let task=null;
  for(const bl of Object.keys(DATA)){
    for(const p of DATA[bl]){
      if(p.type===ptype&&p.tasks[tidx]){task=p.tasks[tidx];break}
    }
    if(task)break;
  }
  if(!task){tooltip.style.display='none';return}
  const dur=task.e-task.s;
  const dsg={};
  // Check parallel
  for(const bl of Object.keys(DATA)){
    for(const p of DATA[bl]){
      if(p.type===ptype){
        p.tasks.forEach(t=>{if(!dsg[t.s])dsg[t.s]=[];dsg[t.s].push(t)});
        break;
      }
    }
  }
  const isPar=dsg[task.s]&&dsg[task.s].length>1;
  const isMile=dur===0;
  const phc=pc(task.p);
  tooltip.innerHTML='<div class="tt-phase" style="color:'+phc+'">'+esc(task.p)+'</div><div class="tt-task">'+esc(task.m)+'</div>'
    +'<div class="tt-row"><span class="tt-label">Timeline:</span><span>D'+task.s+(isMile?'':' &rarr; D'+task.e)+'</span></div>'
    +'<div class="tt-row"><span class="tt-label">Duration:</span><span>'+esc(task.d)+'</span></div>'
    +'<div class="tt-row"><span class="tt-label">Department:</span><span>'+esc(task.dept)+'</span></div>'
    +'<div class="tt-row"><span class="tt-label">Flow:</span><span>'+(isMile?'&#9670; Milestone':(isPar?'&#8741; Parallel':'&rarr; Sequential'))+'</span></div>';
  tooltip.style.display='block';
  const x=Math.min(e.clientX+12,window.innerWidth-340);
  const y=Math.min(e.clientY+12,window.innerHeight-200);
  tooltip.style.left=x+'px';
  tooltip.style.top=y+'px';
});

init();
</script>
</body>
</html>
